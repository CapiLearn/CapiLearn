import_paths:
  - regex

rails:
  config:
    regex_detection:
      input:
        patterns:
          - "\\b(ignore|disregard)\\s+(all\\s+)?(previous|prior|above)\\s+(instructions|rules)\\b"
          - "\\b(reveal|show|print|display|tell me)\\b.{0,40}\\b(system prompt|hidden instructions|developer message|internal policy)\\b"
          - "\\b(api[_ -]?key|secret|password|access token|private key)\\b"
          - "\\b(do|complete|write|solve)\\s+(my|this|the entire|the whole)\\s+(homework|quiz|exam|test|assignment|essay)\\b"
        case_insensitive: true
  input:
    flows:
      - regex check input
