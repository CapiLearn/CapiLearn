repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        name: ruff check backend
        args:
          - --config
          - backend/pyproject.toml
          - --fix
        files: ^backend/.*\.py$
      - id: ruff-format
        name: ruff format backend
        args:
          - --config
          - backend/pyproject.toml
        files: ^backend/.*\.py$
