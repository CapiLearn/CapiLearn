[project]
name = "capstone"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
    "alembic>=1.18.4",
    "fastapi>=0.136.1",
    "httpx>=0.28.1",
    "langgraph>=1.1.10",
    "litellm>=1.83.14,!=1.82.7,!=1.82.8",
    "nemoguardrails>=0.21.0",
    "psycopg[binary]>=3.3.4",
    "pydantic>=2.12.5,<2.13",
    "pydantic-settings>=2.14.1",
    "pyjwt>=2.10.1",
    "sqlalchemy>=2.0.49",
    "uvicorn[standard]>=0.38.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.1",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.15.12",
]

[tool.fastapi]
entrypoint = "backend.main:app"

[tool.pytest.ini_options]
asyncio_mode = "auto"
